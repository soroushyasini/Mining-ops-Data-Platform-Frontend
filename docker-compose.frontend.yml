version: '3.9'

services:
  mining-ops-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mining-ops-frontend
    ports:
      - "3000:80"
    restart: unless-stopped
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://172.16.2.31:8000}
      - BACKEND_URL=${BACKEND_URL:-http://172.16.2.31:8000}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
